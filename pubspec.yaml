name: kubely
description: "Kubely — a mobile cockpit for Kubernetes. 100% on-device, no backend."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking / K8s API
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # YAML / kubeconfig parsing
  yaml: ^3.1.3

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # File picker (add-cluster flow)
  file_picker: ^8.1.7

  # QR scanner (add-cluster flow).
  # ZXing-based: AVFoundation on iOS, ZXing on Android. Deliberately NOT
  # mobile_scanner, whose iOS build links Google ML Kit — that bundles a
  # Clearcut telemetry client and would force us to declare data collection,
  # contradicting Kubely's on-device-only guarantee.
  qr_code_scanner_plus: ^2.2.0

  # Icons (Feather/Lucide style)
  lucide_icons_flutter: ^3.1.15

  # SVG rendering (brand assets)
  flutter_svg: ^2.0.17

  # Animation helpers
  flutter_animate: ^4.5.2

  # Circular progress indicator (health hero)
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/kubely-app-icon-1024.png"
  # The App Store rejects icons with an alpha channel, so the iOS variants are
  # flattened onto the brand background. Android's adaptive foreground still
  # needs the transparency, so the source asset keeps it.
  remove_alpha_ios: true
  background_color_ios: "#0A0B0F"
  adaptive_icon_background: "#0A0B0F"
  adaptive_icon_foreground: "assets/brand/kubely-app-icon-1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/brand/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
